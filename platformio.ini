; GridBot — CYD ESP32-2432S028R (ESP32-WROOM-32, ILI9341, XPT2046, no PSRAM)
; Board config is sourced from CYD-ESP32-2432S028R.md. See IMPLEMENTATION_STEPS.md.

[platformio]
default_envs = cyd_gridbot

; ---- shared settings --------------------------------------------------------
[common]
build_flags =
  -I src
  -DLGFX_USE_V1
  -DCYD_PANEL_RGB_ORDER=1        ; dual-USB units: reversed R/B -> drop BGR bit
  -DDISPLAY_DEFAULT_ROTATION=6   ; MV=0 upright + un-mirrored (CYD ref)
  -DTOUCH_INVERT_X=1
  -DTOUCH_INVERT_Y=1

; ---- ESP32 firmware ---------------------------------------------------------
[env:cyd_gridbot]
platform = espressif32 @ 6.9.0   ; arduino-esp32 2.0.x (3.x leaves too little heap)
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.partitions = partitions.csv
build_flags =
  ${common.build_flags}
lib_deps =
  lovyan03/LovyanGFX@^1.1.16
  bblanchon/ArduinoJson@^7.1.0

; ---- ESP32 on-device self-test harness (-DSELFTEST) -------------------------
[env:cyd_gridbot_selftest]
extends = env:cyd_gridbot
build_flags =
  ${common.build_flags}
  -DSELFTEST

; ---- headless host logic tests (Unity) --------------------------------------
[env:native]
platform = native
test_framework = unity
; Only the platform-agnostic engine compiles on the host. Hardware code
; (hal/, screens/, net/, main.cpp) is excluded so Arduino.h is never pulled in.
build_src_filter = +<core/> +<game/>
build_flags =
  -I src
  -DGRIDBOT_NATIVE
  -std=gnu++17
lib_deps =
  bblanchon/ArduinoJson@^7.1.0
